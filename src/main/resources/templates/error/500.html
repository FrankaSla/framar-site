<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
	<head th:replace="~{fragments/head :: head(${pageTitle}, ${pageDesc}, ${ogImage}, ${ogUrl})}"></head>
	<body>
		<div class="layout">
			<div th:replace="~{fragments/sidebar :: sidebar('')}"></div>
			
			<main class="content">
				<section class="card">
					<h1>500 - Došlo je do greške</h1>
					<p class="muted">
						Nešto je pošlo po krivu na serveru. Pokušajte ponovno za par trenutaka.
					</p>
					
					<div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px;">
						<a class="btn"
							th:href="@{/}">Naslovna</a>
						<a class="btn btn-ghost"
							th:href="@{/kontakt}">Kontakt</a>
						
							<p class="muted" style="margin-top: 14px; font-size: 0.95rem;">
								Ako se ponavlja, pošalji nam poruku preko kontakt firme.
							</p>
					</div>
				</section>
			</main>
		</div>
