<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="sidebar(active)">
	
<!--MOBILE HEADER-->
<div class="mobile-header">
	<img th:src="@{/img/logo.png}"
		 alt="FRAMAR logo">
</div>

  <!-- HAMBURGER (uvijek vidljiv) -->
  <button class="hamburger" type="button" aria-label="Izbornik">
    ☰
  </button>

  <!-- BACKDROP -->
  <div class="sidebar-backdrop" aria-hidden="true"></div>

  <nav class="sidebar">
    <a class="brand" th:href="@{/}">
      <img th:src="@{/img/logo.png}" alt="FRAMAR logo" class="brand-logo">
      <div class="brand-text">
        <div class="brand-name">FRAMAR</div>
        <div class="brand-sub">niskogradnja i podvodni radovi</div>
      </div>
    </a>

    <ul class="nav">
      <li><a th:href="@{/}" th:classappend="${active}=='index' ? ' active' : ''">Naslovna</a></li>
      <li><a th:href="@{/o-nama}" th:classappend="${active}=='o-nama' ? ' active' : ''">O nama</a></li>
      <li><a th:href="@{/usluge}" th:classappend="${active}=='usluge' ? ' active' : ''">Usluge</a></li>
      <li><a th:href="@{/projekti}" th:classappend="${active}=='projekti' ? ' active' : ''">Projekti</a></li>
      <li><a th:href="@{/kontakt}" th:classappend="${active}=='kontakt' ? ' active' : ''">Kontakt</a></li>
    </ul>

    <div class="sidebar-footer">
      <span>© <span id="year"></span> FRAMAR</span>
    </div>

    <script th:src="@{/js/app.js}"></script>
  </nav>

</th:block>
