<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
	<head th:fragment="head(title, description, ogImage, ogUrl)">
	  <meta charset="UTF-8"/>
	  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

	  <title th:text="${title}">FRAMAR</title>
	  <meta name="description" th:content="${description}"/>
	  <link rel="canonical" th:href="${ogUrl}" />
	  
	  <link rel="icon" type="image/png" href="/img/favicon.png">

	  <!-- Open Graph -->
	  <meta property="og:title" th:content="${title}"/>
	  <meta property="og:description" th:content="${description}"/>
	  <meta property="og:type" content="website"/>
	  <meta property="og:locale" content="hr_HR"/>

	  <meta property="og:image" th:content="${ogImage != null ? ogImage : 'https://framar.hr/img/logo.png'}"/>
	  <meta property="og:url" th:content="${ogUrl}"/>

	  <link rel="stylesheet" th:href="@{/css/style.css(v=2)}"/>
	  
	  <script type="application/ld + json">
		{
			"@context": "https://schema.org",
			"@type": "LocalBusiness",
			"name": "Framar",
			"url": "https://framar.hr",
			"logo": "https://framar.hr/img/logo.png",
			"address": {
				"@type": "22211",
				"addressLocality": "Vodice",
				"addressCountry": "HR"
			},
			"areaServed": "Hrvatska",
			"serviceType": [
				"Niskogradnja",
				"Podvodni radovi"
			]
		}
	  </script>
	  
	</head>

</html>
